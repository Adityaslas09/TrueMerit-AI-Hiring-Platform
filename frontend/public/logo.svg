<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" rx="18" fill="#0A0D14"/>

  <!-- Graduation cap flat top (diamond shape) -->
  <polygon points="50,22 82,36 50,50 18,36" fill="none" stroke="url(#lineGrad)" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Cap brim / vertical sides -->
  <line x1="50" y1="50" x2="50" y2="65" stroke="url(#lineGrad)" stroke-width="2.2"/>
  <line x1="34" y1="43" x2="34" y2="60" stroke="url(#lineGrad)" stroke-width="2.2"/>
  <line x1="66" y1="43" x2="66" y2="60" stroke="url(#lineGrad)" stroke-width="2.2"/>

  <!-- Cap bottom edge -->
  <path d="M34,60 Q50,68 66,60" fill="none" stroke="url(#lineGrad)" stroke-width="2.2"/>

  <!-- Tassel string -->
  <line x1="82" y1="36" x2="82" y2="52" stroke="url(#lineGrad)" stroke-width="1.8"/>
  <!-- Tassel bob -->
  <circle cx="82" cy="55" r="3" fill="url(#lineGrad)"/>

  <!-- Grid nodes on cap top -->
  <circle cx="50" cy="22" r="2.5" fill="url(#lineGrad)"/>
  <circle cx="82" cy="36" r="2.5" fill="url(#lineGrad)"/>
  <circle cx="50" cy="50" r="2.5" fill="url(#lineGrad)"/>
  <circle cx="18" cy="36" r="2.5" fill="url(#lineGrad)"/>

  <!-- Inner grid lines on cap top -->
  <line x1="50" y1="22" x2="50" y2="50" stroke="url(#lineGrad)" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="18" y1="36" x2="82" y2="36" stroke="url(#lineGrad)" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- Inner grid mid nodes -->
  <circle cx="50" cy="36" r="2" fill="url(#lineGrad)" opacity="0.8"/>
  <circle cx="34" cy="29" r="1.8" fill="url(#lineGrad)" opacity="0.7"/>
  <circle cx="66" cy="29" r="1.8" fill="url(#lineGrad)" opacity="0.7"/>
  <circle cx="34" cy="43" r="1.8" fill="url(#lineGrad)" opacity="0.7"/>
  <circle cx="66" cy="43" r="1.8" fill="url(#lineGrad)" opacity="0.7"/>

  <!-- Diagonal inner mesh -->
  <line x1="34" y1="29" x2="66" y2="43" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="66" y1="29" x2="34" y2="43" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
</svg>
